# budget.conf — Per-project session spend cap overrides
# Sourced by bin/budget.sh at runtime. Uncomment and adjust as needed.
# These values override the compiled-in defaults in budget.sh.

# Maximum new service account creations per session (default: 5)
# MAX_SIGNUPS=5

# Maximum estimated cumulative spend per session in USD (default: 20.0)
# MAX_COST_USD=20.0

# Maximum tool calls per session — loop guard (default: 500)
# MAX_TOOL_CALLS=500

# Spend level at which warnings are emitted but execution continues (default: 10.0)
# WARN_COST_USD=10.0

# Signup count at which warnings are emitted (default: 3)
# WARN_SIGNUPS=3
